name: Update Options Documentation

on:
  schedule:
    - cron: '0 11 * * *' # 12:00 CET (GitHub cron runs in UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-options-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Fetch latest documentation
        id: fetch-docs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          failed=()
          for script in \
            fetch_binance_options.py \
            fetch_bybit_options.py \
            fetch_deribit.py \
            fetch_derive.py \
            fetch_okx.py
          do
            echo "::group::${script}"
            if ! python "${script}"; then
              failed+=("${script}")
            fi
            echo "::endgroup::"
          done

          if [ ${#failed[@]} -gt 0 ]; then
            printf '%s\n' "${failed[@]}" > failed-fetches.txt
            echo "fetch_failed=true" >> "$GITHUB_OUTPUT"
            echo "failed_scripts=$(IFS=,; echo "${failed[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for documentation changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- binance bybit deribit derive okx)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate commit message
        if: steps.changes.outputs.changed == 'true'
        id: commit-msg
        run: |
          git add binance bybit deribit derive okx

          exchanges=$(git diff --cached --name-only | cut -d/ -f1 | grep -E '^(binance|bybit|deribit|derive|okx)$' | sort -u | paste -sd ', ' -)
          msg="docs: sync exchange docs $(date -u +'%Y-%m-%d')"
          if [ -n "$exchanges" ]; then
            msg="$msg ($exchanges)"
          fi

          echo "message=$msg" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "${{ steps.commit-msg.outputs.message }}"
          git push

      - name: Create issue on fetch failure
        if: steps.fetch-docs.outputs.fetch_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const failed = '${{ steps.fetch-docs.outputs.failed_scripts }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Documentation sync failed - ${date}`,
              body: `One or more fetch scripts failed on ${date}:\n\n${failed}\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
